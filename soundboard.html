<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard</title>
<style>
  :root{
    --bg: #121214;
    --panel: #1c1c20;
    --pad: #242428;
    --pad-border: #34343a;
    --accent: #ff6b35;
    --accent-soft: rgba(255,107,53,0.18);
    --edit: #4ea8de;
    --text: #f1f0ec;
    --text-dim: #8a8a92;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 0%, rgba(255,107,53,0.06), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    padding:32px 24px 60px;
  }
  header{
    max-width:1000px;
    margin:0 auto 28px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  h1{
    font-size:22px;
    letter-spacing:0.02em;
    margin:0;
    font-weight:700;
  }
  h1 span{ color:var(--accent); }
  #status{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-dim);
  }
  #stopAllBtn{
    font-family:var(--sans);
    font-size:12px;
    font-weight:600;
    letter-spacing:0.02em;
    color:var(--text);
    background:var(--panel);
    border:1px solid var(--pad-border);
    border-radius:7px;
    padding:7px 14px;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease, background .15s ease;
  }
  #stopAllBtn:hover{
    border-color:var(--accent);
    color:var(--accent);
    background:var(--accent-soft);
  }
  #stopAllBtn:active{ transform:scale(0.97); }
  #grid{
    max-width:1000px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
    gap:14px;
  }
  .pad{
    position:relative;
    background:var(--pad);
    border:1px solid var(--pad-border);
    border-radius:10px;
    padding:16px 14px 14px;
    cursor:pointer;
    user-select:none;
    transition:transform .08s ease, box-shadow .15s ease, border-color .15s ease;
    display:flex;
    flex-direction:column;
    gap:6px;
    min-height:78px;
  }
  .pad:hover{ border-color:#46464e; }
  .pad:active{ transform:scale(0.97); }
  .pad.playing{
    border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent), 0 0 22px var(--accent-soft);
  }
  .pad .idx{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.05em;
  }
  .pad .name{
    font-size:15px;
    font-weight:600;
    line-height:1.25;
    outline:none;
    word-break:break-word;
  }
  .pad .name[contenteditable="true"]:focus{
    color:var(--edit);
  }
  .pad .edit-btn{
    position:absolute;
    top:8px;
    right:8px;
    width:20px;
    height:20px;
    border-radius:5px;
    background:transparent;
    border:none;
    color:var(--text-dim);
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .15s ease, color .15s ease, background .15s ease;
  }
  .pad:hover .edit-btn{ opacity:1; }
  .pad .edit-btn:hover{ color:var(--edit); background:rgba(78,168,222,0.12); }
  #empty{
    max-width:1000px;
    margin:60px auto 0;
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    line-height:1.6;
  }
  #empty code{
    background:var(--panel);
    padding:2px 6px;
    border-radius:4px;
    font-family:var(--mono);
    color:var(--text);
  }
</style>
</head>
<body>

<header>
  <h1>Sound<span>board</span></h1>
  <div style="display:flex; align-items:center; gap:14px;">
    <div id="status">scansione dei file in corso&hellip;</div>
    <button id="stopAllBtn" type="button">&#9632; Stop tutti</button>
  </div>
</header>

<div id="grid"></div>
<div id="empty" style="display:none">
  Nessun file audio trovato.<br>
  Metti dei file <code>0.mp3</code>, <code>1.mp3</code>, <code>2.mp3</code>&hellip; nella stessa cartella di questa pagina.
</div>

<script>
(function(){
  const MAX_INDEX = 50; // controlla file da 0.mp3 a 50.mp3
  const STORAGE_KEY = 'soundboard_names';
  const grid = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const emptyEl = document.getElementById('empty');

  const names = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  let found = 0;
  let checked = 0;

  // tiene traccia di TUTTE le istanze audio attualmente in riproduzione,
  // ognuna associata alla casella (pad) a cui appartiene, cosi' piu' suoni
  // possono andare insieme e lo stesso pulsante puo' essere premuto piu' volte
  // senza interrompere le riproduzioni precedenti.
  const activeInstances = new Set(); // { audio, padEl }

  function saveNames(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(names));
  }

  function stopAll(){
    activeInstances.forEach(({ audio, padEl }) => {
      audio.pause();
      audio.currentTime = 0;
      padEl.classList.remove('playing');
    });
    activeInstances.clear();
  }

  document.getElementById('stopAllBtn').addEventListener('click', stopAll);

  function updateStatus(){
    statusEl.textContent = checked < MAX_INDEX + 1
      ? `scansione (${checked}/${MAX_INDEX + 1})&hellip;`
      : `${found} suon${found===1?'o':'i'} trovat${found===1?'o':'i'}`;
    if (checked < MAX_INDEX + 1) {
      statusEl.innerHTML = statusEl.textContent;
    } else {
      statusEl.textContent = `${found} suon${found===1?'o':'i'} trovat${found===1?'o':'i'}`;
      if (found === 0) emptyEl.style.display = 'block';
    }
  }

  function createPad(index, audio){
    const pad = document.createElement('div');
    pad.className = 'pad';

    const idx = document.createElement('div');
    idx.className = 'idx';
    idx.textContent = '#' + index;

    const name = document.createElement('div');
    name.className = 'name';
    name.contentEditable = 'false';
    name.spellcheck = false;
    name.textContent = names[index] || String(index);

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.title = 'Rinomina';
    editBtn.textContent = '\u270e'; // pencil
    editBtn.type = 'button';

    function enterEdit(e){
      e.stopPropagation();
      name.contentEditable = 'true';
      name.focus();
      document.execCommand('selectAll', false, null);
    }

    function exitEdit(){
      name.contentEditable = 'false';
      const val = name.textContent.trim() || String(index);
      name.textContent = val;
      names[index] = val;
      saveNames();
    }

    editBtn.addEventListener('click', enterEdit);
    name.addEventListener('dblclick', enterEdit);
    name.addEventListener('blur', exitEdit);
    name.addEventListener('keydown', (e) => {
      if (e.key === 'Enter'){ e.preventDefault(); name.blur(); }
      if (e.key === 'Escape'){
        name.textContent = names[index] || String(index);
        name.blur();
      }
    });

    pad.addEventListener('click', (e) => {
      if (name.isContentEditable) return;
      // ogni click crea una NUOVA istanza dell'audio: niente reset di
      // riproduzioni in corso, e piu' click sullo stesso pad suonano
      // in parallelo (sovrapposti).
      const instance = audio.cloneNode(true);
      instance.currentTime = 0;
      const entry = { audio: instance, padEl: pad };
      activeInstances.add(entry);
      pad.classList.add('playing');
      instance.addEventListener('ended', () => {
        activeInstances.delete(entry);
        // rimuovi l'evidenziazione solo se non ci sono altre istanze
        // di questo stesso pad ancora in riproduzione
        const stillPlaying = [...activeInstances].some(e => e.padEl === pad);
        if (!stillPlaying) pad.classList.remove('playing');
      });
      instance.play();
    });

    pad.appendChild(idx);
    pad.appendChild(name);
    pad.appendChild(editBtn);
    return pad;
  }

  // contenitore temporaneo per mantenere l'ordine corretto (0,1,2...)
  const slots = new Array(MAX_INDEX + 1).fill(null);
  let renderedCount = 0;

  function renderIfReady(){
    // re-render in ordine ogni volta che un nuovo pad valido arriva
    grid.innerHTML = '';
    slots.forEach((pad) => { if (pad) grid.appendChild(pad); });
  }

  for (let i = 0; i <= MAX_INDEX; i++){
    const audio = new Audio();
    audio.src = i + '.mp3';
    audio.preload = 'metadata';

    audio.addEventListener('loadedmetadata', () => {
      if (slots[i]) return; // evita doppioni
      slots[i] = createPad(i, audio);
      found++;
      checked++;
      renderIfReady();
      updateStatus();
    });

    audio.addEventListener('error', () => {
      checked++;
      updateStatus();
    });
  }

  updateStatus();
})();
</script>

</body>
</html>
